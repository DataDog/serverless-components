name: Cargo

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string

permissions: {}

jobs:
  setup:
    name: Setup
    runs-on: ${{ inputs.runner }}
    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@9399c7bb15d4c7d47b27263d024f0a4978346ba4 # v1.11.0
        with:
          cache: false
      - uses: mozilla-actions/sccache-action@65101d47ea8028ed0c98a1cdea8dd9182e9b5133 #v0.0.8

  check:
    name: Check
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Protoc Binary
        shell: bash
        run: chmod +x ./scripts/install-protoc.sh && ./scripts/install-protoc.sh $HOME
      - shell: bash
        run: cargo check --workspace

  format:
    name: Format
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - shell: bash
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Protoc Binary
        shell: bash
        run: chmod +x ./scripts/install-protoc.sh && ./scripts/install-protoc.sh $HOME
      - shell: bash
        run: |
          if [[ "${{ inputs.runner }}" == "windows-2022" ]]; then
            # we don't technially support the datadog-fips crate on windows
            # right now anyway, so let's set this so that the windows build
            # doesn't fail.
            export AWS_LC_FIPS_SYS_NO_ASM=1
          fi
          cargo clippy --workspace --all-features

  build:
    name: Build
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Protoc Binary
        shell: bash
        run: chmod +x ./scripts/install-protoc.sh && ./scripts/install-protoc.sh $HOME
      - shell: bash
        run: cargo build --all

  build-datadog-serverless-compat:
    name: Build Datadog Serverless Compat
    uses: ./.github/workflows/build-datadog-serverless-compat.yml
    with:
      runner: ${{ inputs.runner }}

  test:
    name: Test
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: taiki-e/install-action@9ba3ac3fd006a70c6e186a683577abc1ccf0ff3a # v2.54.0
        with:
          tool: nextest@0.9
      - name: Install Protoc Binary
        shell: bash
        run: chmod +x ./scripts/install-protoc.sh && ./scripts/install-protoc.sh $HOME
      - shell: bash
        run: |
          if [[ "${{ inputs.runner }}" == "windows-2022" ]]; then
            cargo nextest run --workspace --features datadog-serverless-compat/windows-pipes
          else
            cargo nextest run --workspace
          fi

  bench:
    name: Memory Working Set Benchmark
    permissions:
      contents: write
    needs: setup
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Protoc Binary
        shell: bash
        run: chmod +x ./scripts/install-protoc.sh && ./scripts/install-protoc.sh $HOME
      - name: Run memory working set benchmark
        shell: bash
        run: cargo bench --bench memory_working_set
        env:
          BENCH_OUTPUT: ${{ github.workspace }}/bench-output.json
      - name: Create benchmark data directory
        shell: bash
        run: mkdir -p benchmarks/${{ inputs.runner }}
      - uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1.22.0
        with:
          tool: customSmallerIsBetter
          output-file-path: ${{ github.workspace }}/bench-output.json
          external-data-json-path: ./benchmarks/${{ inputs.runner }}/memory.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false
          auto-push: false
